# ============================================================

#  V2Free (Maxo) 每日自动签到 — GitHub Actions 工作流

#

#  📌 功能说明：

#     每天 08:30（北京时间）自动执行 V2Free 签到

#

# ============================================================



name: V2Free 每日自动签到



on:

  schedule:

    - cron: '30 0 * * *'

  workflow_dispatch:



jobs:

  checkin:

    name: 执行签到

    runs-on: ubuntu-latest



    steps:

      - name: 📥 检出代码

        uses: actions/checkout@v4



      - name: 🐍 设置 Python

        uses: actions/setup-python@v5

        with:

          python-version: '3.11'



      - name: 📦 安装依赖

        run: pip install requests -q



      - name: ✅ 执行签到

        env:

          # 默认使用 Cookie 模式（推荐）

          AUTH_METHOD: cookie

          V2FREE_COOKIE: ${{ secrets.V2FREE_COOKIE }}

          # 在仓库 Settings → Secrets 中设置



          # 可选覆盖

          V2FREE_URL: ${{ secrets.V2FREE_URL }}

          TZ_OFFSET: '8'

        run: |

          python scripts/checkin.py 2>&1 | tee checkin.log



      - name: ⬆️ 上传日志（仅失败时）

        if: failure()

        uses: actions/upload-artifact@v4

        with:

          name: checkin-log

          path: checkin.log



      - name: 📧 签到失败通知

        if: failure()

        run: |

          echo "::warning::V2Free 签到失败！请检查 Secrets 配置和账号状态。"

          echo "::warning::如果连续多天失败，可能需要更新 Cookie 或密码。"



      - name: 📊 记录执行时间

        if: always()

        run: |

          echo "执行时间: $(date '+%Y-%m-%d %H:%M:%S %Z')"

          echo "下次执行: 明天 08:30 北京时间"
